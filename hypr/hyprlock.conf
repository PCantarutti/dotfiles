# ~/.config/hypr/hyprlock.conf

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

# Plano de fundo
background {
    monitor =
    path = ~/wallpapers/Sekiro.jpg   # ou deixe vazio para cor sólida
    color = rgba(25, 20, 20, 1.0)

    # Blur
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
}

# Entrada de senha
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)

    fade_on_empty = true
    placeholder_text = <i>Senha...</i>

    hide_input = false
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>

    position = 0, -100
    halign = center
    valign = center
}

# Hora
label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 0.9)
    font_size = 64
    font_family = JetBrains Mono Bold

    position = 0, 100
    halign = center
    valign = center
}

# Data
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d de %B')"
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = JetBrains Mono

    position = 0, 30
    halign = center
    valign = center
}
